    // DOM元素
    const categoryButtons = document.querySelectorAll('.category-btn');
    const sections = document.querySelectorAll('section[id^="section-"]');
    const selectedFooter = document.getElementById('selected-footer');
    const toggleFooterBtn = document.getElementById('toggle-footer');
    const selectedCount = document.getElementById('selected-count');
    const selectedItems = document.getElementById('selected-items');
    const emptySelected = document.getElementById('empty-selected');
    const dishModal = document.getElementById('dish-modal');
    const modalOverlay = document.getElementById('modal-overlay');
    const closeModalBtn = document.getElementById('close-modal');
    const modalContent = document.getElementById('modal-content');
    const imageModal = document.getElementById('image-modal');
    const imageModalOverlay = document.getElementById('image-modal-overlay');
    const closeImageModalBtn = document.getElementById('close-image-modal');
    const enlargedImage = document.getElementById('enlarged-image');

    // 初始化页面
    function initPage() {
      renderDishes();
      setupEventListeners();
      
      // 默认选中第一个分类（荤食）
      const firstCategoryBtn = document.getElementById('nav-meat');
      if (firstCategoryBtn) {
        firstCategoryBtn.click();
      }
    }

    // 渲染菜品
    function renderDishes() {
      // 清空所有区域
      sections.forEach(section => {
        const grid = section.querySelector('.grid');
        if (grid) {
          grid.innerHTML = '';
        }
      });

      // 渲染菜品到各个区域
      dishes.forEach(dish => {
        // 渲染到对应分类
        const categorySection = document.getElementById(`section-${dish.category}`);
        if (categorySection) {
          const grid = categorySection.querySelector('.grid');
          if (grid) {
            grid.appendChild(createDishCard(dish));
          }
        }


      });
    }

    // 创建菜品卡片
    function createDishCard(dish) {
      const card = document.createElement('div');
      card.className = 'bg-white rounded-lg shadow-card overflow-hidden transition-all duration-300 hover:shadow-card-hover scale-on-hover cursor-pointer';
      card.dataset.dishId = dish.id;
      
      card.innerHTML = `
        <div class="relative">
          <img src="${dish.image}" alt="${dish.name}" class="w-full h-48 object-cover">
          <div class="absolute top-2 right-2 bg-white rounded-full p-1 shadow-md">
            <span class="text-primary text-lg font-bold">
              ${getRatingIcon(dish.rating)}
            </span>
          </div>
        </div>
        <div class="p-4">
          <h3 class="text-lg font-bold mb-2">${dish.name}</h3>
          <p class="text-gray-600 text-sm mb-4 line-clamp-2">${dish.description}</p>
          <div class="flex justify-between items-center">
            <span class="text-sm text-gray-500">${getCategoryName(dish.category)}</span>
            <button class="select-btn px-3 py-1 rounded-full text-sm font-medium transition-all ${dish.selected ? 'bg-success text-white' : 'bg-gray-200 text-gray-700 hover:bg-primary hover:text-white'}">
              ${dish.selected ? '已选择' : '选择'}
            </button>
          </div>
        </div>
      `;

      // 添加点击事件
      card.addEventListener('click', (e) => {
        // 如果点击的是选择按钮，不打开详情
        if (e.target.closest('.select-btn')) {
          toggleDishSelection(dish.id);
          e.stopPropagation();
        } else {
          openDishModal(dish.id);
        }
      });

      return card;
    }

    // 获取推荐等级图标
    function getRatingIcon(rating) {
      // 使用不同的图标表示不同的推荐等级
      const icons = [
        // '<i class="fa fa-star-o"></i>',
        // '<i class="fa fa-star-half-o"></i>',
        // '<i class="fa fa-star"></i>',
        // '<i class="fa fa-heart"></i>',
        // '<i class="fa fa-fire"></i>'
        '🍭',
        '🫑',
        '🌶️',
        '🔥',
        '💀'
      ];
      
      // 确保rating在有效范围内
      const index = Math.min(Math.max(Math.floor(rating) - 1, 0), icons.length - 1);
      return icons[index];
    }

    // 获取分类名称
    function getCategoryName(category) {
      const categoryNames = {
        'meat': '猪肉',
        'beef': '牛肉',
        'chicken': '禽类',
        'seafood': '海鲜',
        'vegetable': '素菜',
        'cold': '凉菜',
        'staple': '主食',
        'snack': '小吃',
        'dessert': '甜品',
        'soap': '汤品'
      };
      return categoryNames[category] || category;
    }

    // 设置事件监听器
    function setupEventListeners() {
      // 顶部显示/隐藏已选菜品按钮
      const toggleSelectedBtn = document.getElementById('toggle-selected-btn');
      if (toggleSelectedBtn) {
        toggleSelectedBtn.addEventListener('click', toggleSelectedFooter);
      }
      
      // 分类导航点击事件
      categoryButtons.forEach(button => {
        button.addEventListener('click', () => {
          const category = button.id.replace('nav-', '');
          scrollToSection(category);
          
          // 更新按钮样式
          categoryButtons.forEach(btn => {
            btn.classList.remove('active', 'bg-primary', 'text-white');
            btn.classList.add('bg-gray-200');
          });
          button.classList.add('active', 'bg-primary', 'text-white');
          button.classList.remove('bg-gray-200');
        });
      });

      // 底部栏切换事件
      toggleFooterBtn.addEventListener('click', toggleSelectedFooter);

      // 模态窗口事件
      modalOverlay.addEventListener('click', closeDishModal);
      closeModalBtn.addEventListener('click', closeDishModal);
      
      // 图片模态窗口事件
      imageModalOverlay.addEventListener('click', closeImageModal);
      closeImageModalBtn.addEventListener('click', closeImageModal);

      // 键盘事件
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
          closeDishModal();
          closeImageModal();
        }
      });
    }

    // 滚动到指定区域
    function scrollToSection(category) {
      const section = document.getElementById(`section-${category}`);
      if (section) {
        section.scrollIntoView({ behavior: 'smooth' });
      }
    }

    // 切换菜品选择状态
    function toggleDishSelection(dishId) {
      const dish = dishes.find(d => d.id === dishId);
      if (dish) {
        dish.selected = !dish.selected;
        updateDishCards(dishId);
        updateSelectedFooter();
      }
    }

    // 更新菜品卡片状态
    function updateDishCards(dishId) {
      const dish = dishes.find(d => d.id === dishId);
      if (!dish) return;

      // 更新所有包含该菜品的卡片
      const cards = document.querySelectorAll(`[data-dish-id="${dishId}"]`);
      cards.forEach(card => {
        const selectBtn = card.querySelector('.select-btn');
        if (selectBtn) {
          selectBtn.textContent = dish.selected ? '已选择' : '选择';
          if (dish.selected) {
            selectBtn.classList.remove('bg-gray-200', 'text-gray-700', 'hover:bg-primary', 'hover:text-white');
            selectBtn.classList.add('bg-success', 'text-white');
          } else {
            selectBtn.classList.remove('bg-success', 'text-white');
            selectBtn.classList.add('bg-gray-200', 'text-gray-700', 'hover:bg-primary', 'hover:text-white');
          }
        }
      });

      // 如果模态窗口打开且显示的是当前菜品，也更新模态窗口
      if (!dishModal.classList.contains('hidden')) {
        const modalDishId = parseInt(modalContent.dataset.dishId);
        if (modalDishId === dishId) {
          const modalSelectBtn = modalContent.querySelector('.select-btn');
          if (modalSelectBtn) {
            modalSelectBtn.textContent = dish.selected ? '已选择' : '选择';
            if (dish.selected) {
              modalSelectBtn.classList.remove('bg-gray-200', 'text-gray-700', 'hover:bg-primary', 'hover:text-white');
              modalSelectBtn.classList.add('bg-success', 'text-white');
            } else {
              modalSelectBtn.classList.remove('bg-success', 'text-white');
              modalSelectBtn.classList.add('bg-gray-200', 'text-gray-700', 'hover:bg-primary', 'hover:text-white');
            }
          }
        }
      }
    }

    // 更新已选菜品底部栏
    function updateSelectedFooter() {
      const selectedDishes = dishes.filter(dish => dish.selected);
      selectedCount.textContent = selectedDishes.length;

      // 更新已选菜品列表
      selectedItems.innerHTML = '';
      
      if (selectedDishes.length === 0) {
        emptySelected.classList.remove('hidden');
        selectedItems.appendChild(emptySelected);
      } else {
        emptySelected.classList.add('hidden');
        selectedDishes.forEach(dish => {
          const item = document.createElement('div');
          item.className = 'flex justify-between items-center py-2 border-b border-gray-100';
          item.innerHTML = `
            <div class="flex items-center">
              <span class="font-medium">${dish.name}</span>
              <span class="ml-2 text-xs text-gray-500">${getCategoryName(dish.category)}</span>
            </div>
            <button class="remove-btn text-xs text-gray-500 hover:text-red-500 transition-colors" data-dish-id="${dish.id}">
              <i class="fa fa-times-circle"></i> 移除
            </button>
          `;
          selectedItems.appendChild(item);

          // 添加移除按钮事件
          const removeBtn = item.querySelector('.remove-btn');
          removeBtn.addEventListener('click', () => {
            toggleDishSelection(dish.id);
          });
        });
      }

      // 显示底部栏（如果有选中的菜品）
      if (selectedDishes.length > 0 && selectedFooter.classList.contains('translate-y-full')) {
        selectedFooter.classList.remove('translate-y-full');
      }
    }

    // 切换已选菜品底部栏显示/隐藏
    function toggleSelectedFooter() {
      const isHidden = selectedFooter.classList.contains('translate-y-full');
      const toggleIcon = document.getElementById('toggle-icon');
      
      if (isHidden) {
        selectedFooter.classList.remove('translate-y-full');
        toggleFooterBtn.innerHTML = '<i class="fa fa-chevron-down"></i>';
        if (toggleIcon) {
          toggleIcon.className = 'fa fa-times';
        }
      } else {
        selectedFooter.classList.add('translate-y-full');
        toggleFooterBtn.innerHTML = '<i class="fa fa-chevron-up"></i>';
        if (toggleIcon) {
          toggleIcon.className = 'fa fa-list';
        }
      }
    }

    // 打开菜品详情模态窗口
    function openDishModal(dishId) {
      const dish = dishes.find(d => d.id === dishId);
      if (!dish) return;

      modalContent.dataset.dishId = dish.id;
      modalContent.innerHTML = `
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div class="relative cursor-pointer" id="modal-image-container">
            <img src="${dish.image}" alt="${dish.name}" class="w-full h-64 object-cover rounded-lg">
            <div class="absolute bottom-2 right-2 bg-white bg-opacity-80 rounded-full p-1 shadow-sm">
              <i class="fa fa-search-plus text-primary"></i>
            </div>
          </div>
          <div>
            <div class="flex justify-between items-start mb-2">
              <h3 class="text-xl font-bold">${dish.name}</h3>
              <span class="text-primary">${getRatingIcon(dish.rating)}</span>
            </div>
            <p class="text-sm text-gray-500 mb-2">${getCategoryName(dish.category)}</p>
            <p class="text-gray-700 mb-4">${dish.description}</p>
            <div class="flex justify-between items-center">
              <button class="select-btn px-4 py-2 rounded-full text-sm font-medium transition-all ${dish.selected ? 'bg-success text-white' : 'bg-gray-200 text-gray-700 hover:bg-primary hover:text-white'}">
                ${dish.selected ? '已选择' : '选择'}
              </button>
            </div>
          </div>
        </div>
      `;

      // 添加图片点击事件（放大查看）
      const modalImageContainer = modalContent.querySelector('#modal-image-container');
      modalImageContainer.addEventListener('click', () => {
        openImageModal(dish.image);
      });

      // 添加选择按钮事件
      const selectBtn = modalContent.querySelector('.select-btn');
      selectBtn.addEventListener('click', () => {
        toggleDishSelection(dish.id);
      });

      // 显示模态窗口
      dishModal.classList.remove('hidden');
      document.body.style.overflow = 'hidden'; // 防止背景滚动
    }

    // 关闭菜品详情模态窗口
    function closeDishModal() {
      dishModal.classList.add('hidden');
      document.body.style.overflow = ''; // 恢复背景滚动
    }

    // 打开图片放大模态窗口
    function openImageModal(imageSrc) {
      enlargedImage.src = imageSrc;
      imageModal.classList.remove('hidden');
      document.body.style.overflow = 'hidden'; // 防止背景滚动
    }

    // 关闭图片放大模态窗口
    function closeImageModal() {
      imageModal.classList.add('hidden');
      document.body.style.overflow = ''; // 恢复背景滚动
    }

    // 页面加载完成后初始化
    document.addEventListener('DOMContentLoaded', initPage);
  </script>
